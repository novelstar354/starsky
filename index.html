<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Space Aurora</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
    width:100%;
    height:100%;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let stars = [];
let milkyWay = [];

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    createMilkyWay();
}

window.addEventListener("resize", resize);
resize();

/* =========================
   星生成
========================= */

const STAR_COUNT = 80;

function createStars(){

    stars = [];

    for(let i=0;i<STAR_COUNT;i++){

        stars.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            r:Math.random()*2+0.5,
            vx:(Math.random()-0.5)*0.8,
            vy:(Math.random()-0.5)*0.8,
            twinkle:Math.random()*Math.PI*2
        });

    }
}

createStars();

/* =========================
   天の川
========================= */

function createMilkyWay(){

    milkyWay = [];

    const angle = -0.35;

    for(let i=0;i<1500;i++){

        const spread =
            (Math.random()-0.5)*220;

        const t =
            Math.random()*canvas.height*1.4;

        const centerX =
            canvas.width*0.5 +
            Math.cos(angle)*spread;

        const centerY =
            t +
            Math.sin(angle)*spread;

        milkyWay.push({
            x:centerX,
            y:centerY,
            r:Math.random()*1.8+0.2
        });
    }
}

/* =========================
   深宇宙背景
========================= */

function drawBackground(){

    const g =
        ctx.createLinearGradient(
            0,0,
            0,canvas.height
        );

    g.addColorStop(0,"#081228");
    g.addColorStop(0.25,"#050b18");
    g.addColorStop(0.55,"#03050f");
    g.addColorStop(0.8,"#010208");
    g.addColorStop(1,"#000000");

    ctx.fillStyle = g;
    ctx.fillRect(
        0,0,
        canvas.width,
        canvas.height
    );

    const glow =
        ctx.createRadialGradient(
            canvas.width/2,
            canvas.height*0.2,
            0,
            canvas.width/2,
            canvas.height*0.2,
            canvas.width
        );

    glow.addColorStop(
        0,
        "rgba(70,100,255,0.08)"
    );

    glow.addColorStop(
        1,
        "rgba(0,0,0,0)"
    );

    ctx.fillStyle = glow;
    ctx.fillRect(
        0,0,
        canvas.width,
        canvas.height
    );
}

/* =========================
   オーロラ
========================= */

function drawAurora(){

    const time =
        Date.now()*0.00012;

    ctx.shadowBlur = 40;
    ctx.shadowColor =
        "rgba(0,255,200,0.35)";

    for(let i=0;i<4;i++){

        const y =
            canvas.height*0.1 +
            i*60 +
            Math.sin(
                time+i
            )*25;

        const aurora =
            ctx.createLinearGradient(
                0,y,
                canvas.width,
                y+400
            );

        aurora.addColorStop(
            0,
            "rgba(0,255,180,0)"
        );

        aurora.addColorStop(
            0.25,
            "rgba(0,255,180,0.12)"
        );

        aurora.addColorStop(
            0.5,
            "rgba(80,255,220,0.16)"
        );

        aurora.addColorStop(
            0.75,
            "rgba(150,120,255,0.12)"
        );

        aurora.addColorStop(
            1,
            "rgba(0,0,0,0)"
        );

        ctx.fillStyle = aurora;

        ctx.beginPath();

        ctx.moveTo(0,y);

        for(let x=0;x<=canvas.width;x+=25){

            ctx.lineTo(
                x,
                y +
                Math.sin(
                    x*0.005+
                    time+i
                )*45
            );
        }

        ctx.lineTo(
            canvas.width,
            canvas.height
        );

        ctx.lineTo(
            0,
            canvas.height
        );

        ctx.closePath();
        ctx.fill();
    }

    ctx.shadowBlur = 0;
}

/* =========================
   天の川描画
========================= */

function drawMilkyWay(){

    ctx.shadowBlur = 15;
    ctx.shadowColor =
        "rgba(255,255,255,0.4)";

    for(const s of milkyWay){

        ctx.fillStyle =
            "rgba(255,255,255,0.22)";

        ctx.beginPath();

        ctx.arc(
            s.x,
            s.y,
            s.r,
            0,
            Math.PI*2
        );

        ctx.fill();
    }

    ctx.shadowBlur = 0;
}

/* =========================
   星更新
========================= */

function updateStars(){

    for(const s of stars){

        s.x += s.vx;
        s.y += s.vy;

        if(s.x < 0) s.x = canvas.width;
        if(s.x > canvas.width) s.x = 0;

        if(s.y < 0) s.y = canvas.height;
        if(s.y > canvas.height) s.y = 0;

        s.twinkle += 0.03;
    }
}

/* =========================
   星座線
========================= */

function drawConnections(){

    for(let i=0;i<stars.length;i++){

        for(let j=i+1;j<stars.length;j++){

            const dx =
                stars[i].x -
                stars[j].x;

            const dy =
                stars[i].y -
                stars[j].y;

            const dist =
                Math.sqrt(
                    dx*dx +
                    dy*dy
                );

            if(dist < 70){

                const alpha =
                    (1-dist/70)
                    *0.25;

                ctx.strokeStyle =
                    `rgba(
                        180,
                        220,
                        255,
                        ${alpha}
                    )`;

                ctx.lineWidth = 1.2;

                ctx.beginPath();

                ctx.moveTo(
                    stars[i].x,
                    stars[i].y
                );

                ctx.lineTo(
                    stars[j].x,
                    stars[j].y
                );

                ctx.stroke();
            }
        }
    }
}

/* =========================
   星描画
========================= */

function drawStars(){

    for(const s of stars){

        const glow =
            8 +
            Math.sin(
                s.twinkle
            )*4;

        ctx.shadowBlur =
            glow;

        ctx.shadowColor =
            "#ffffff";

        ctx.fillStyle =
            "#ffffff";

        ctx.beginPath();

        ctx.arc(
            s.x,
            s.y,
            s.r,
            0,
            Math.PI*2
        );

        ctx.fill();
    }

    ctx.shadowBlur = 0;
}

/* =========================
   メインループ
========================= */

function animate(){

    drawBackground();

    drawAurora();

    drawMilkyWay();

    updateStars();

    drawConnections();

    drawStars();

    requestAnimationFrame(
        animate
    );
}

animate();
</script>

</body>
</html>
