<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deep Space Constellation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

canvas{
    display:block;
    width:100%;
    height:100%;
}
</style>

</head>
<body>

<canvas id="bg"></canvas>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

window.addEventListener("resize", resize);
resize();

/* =========================
   星生成
========================= */

const STAR_COUNT = 220;
const stars = [];

for(let i=0;i<STAR_COUNT;i++){

    const size =
        Math.pow(
            Math.random(),
            3
        ) * 3 + 0.3;

    stars.push({

        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,

        r:size,

        vx:(Math.random()-0.5)*1.4,
        vy:(Math.random()-0.5)*1.4,

        twinkle:
            Math.random()*Math.PI*2

    });
}

/* =========================
   深宇宙背景
========================= */

function drawBackground(){

    const g =
        ctx.createLinearGradient(
            0,0,
            0,canvas.height
        );

    g.addColorStop(0,"#10214d");
    g.addColorStop(0.2,"#0b1735");
    g.addColorStop(0.45,"#081126");
    g.addColorStop(0.7,"#040914");
    g.addColorStop(1,"#000000");

    ctx.fillStyle = g;
    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    const glow =
        ctx.createRadialGradient(
            canvas.width/2,
            canvas.height*0.15,
            0,
            canvas.width/2,
            canvas.height*0.15,
            canvas.width
        );

    glow.addColorStop(
        0,
        "rgba(90,130,255,0.10)"
    );

    glow.addColorStop(
        1,
        "rgba(0,0,0,0)"
    );

    ctx.fillStyle = glow;
    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    const centerGlow =
        ctx.createRadialGradient(
            canvas.width/2,
            canvas.height/2,
            0,
            canvas.width/2,
            canvas.height/2,
            canvas.width
        );

    centerGlow.addColorStop(
        0,
        "rgba(120,160,255,0.04)"
    );

    centerGlow.addColorStop(
        1,
        "rgba(0,0,0,0)"
    );

    ctx.fillStyle = centerGlow;
    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );
}

/* =========================
   星更新
========================= */

function updateStars(){

    for(const s of stars){

        s.x += s.vx;
        s.y += s.vy;

        if(s.x < 0) s.x = canvas.width;
        if(s.x > canvas.width) s.x = 0;

        if(s.y < 0) s.y = canvas.height;
        if(s.y > canvas.height) s.y = 0;

        s.twinkle += 0.04;
    }
}

/* =========================
   星座線
========================= */

function drawConnections(){

    ctx.shadowBlur = 10;
    ctx.shadowColor =
        "rgba(180,220,255,0.8)";

    for(let i=0;i<stars.length;i++){

        const nearest = [];

        for(let j=0;j<stars.length;j++){

            if(i === j) continue;

            const dx =
                stars[i].x -
                stars[j].x;

            const dy =
                stars[i].y -
                stars[j].y;

            const dist =
                Math.sqrt(
                    dx*dx +
                    dy*dy
                );

            if(dist < 120){

                nearest.push({
                    index:j,
                    dist:dist
                });
            }
        }

        nearest.sort(
            (a,b)=>a.dist-b.dist
        );

        const count =
            Math.min(
                3,
                nearest.length
            );

        for(let k=0;k<count;k++){

            const other =
                stars[
                    nearest[k].index
                ];

            const dist =
                nearest[k].dist;

            const alpha =
                (1-dist/120)*0.7;

            ctx.strokeStyle =
                `rgba(180,220,255,${alpha})`;

            ctx.lineWidth = 1.5;

            ctx.beginPath();

            ctx.moveTo(
                stars[i].x,
                stars[i].y
            );

            ctx.lineTo(
                other.x,
                other.y
            );

            ctx.stroke();
        }
    }

    ctx.shadowBlur = 0;
}

/* =========================
   星描画
========================= */

function drawStars(){

    for(const s of stars){

        const glow =
            10 +
            Math.sin(
                s.twinkle
            ) * 6;

        ctx.shadowBlur =
            glow;

        ctx.shadowColor =
            "#ffffff";

        ctx.fillStyle =
            "#ffffff";

        ctx.beginPath();

        ctx.arc(
            s.x,
            s.y,
            s.r,
            0,
            Math.PI*2
        );

        ctx.fill();
    }

    ctx.shadowBlur = 0;
}

/* =========================
   メインループ
========================= */

function animate(){

    drawBackground();

    updateStars();

    drawConnections();

    drawStars();

    requestAnimationFrame(
        animate
    );
}

animate();
</script>

</body>
</html>
